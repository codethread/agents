<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>{{TITLE}}</title>
		<style>
			:root {
				color-scheme: light dark;
				/* Rose Pine Dawn: pi/themes/rose-pine-dawn.json */
				--bg: #fdf9f5;
				--fg: #575279;
				--muted: #9893a5;
				--dim: #797593;
				--border: #dfdad9;
				--code-bg: #fffaf3;
				--accent: #b85c58;
				--link: #286983;
				--info-bg: #f4ede8;
				--info-bd: #56949f;
				--warn-bg: #f4ede8;
				--warn-bd: #a86a00;
				--error-bg: #f4ede8;
				--error-bd: #b4637a;
				--success-bg: #f4ede8;
				--success-bd: #a86a00;
				--add-bg: #fceee5;
				--add-fg: #a86a00;
				--del-bg: #f9e8e7;
				--del-fg: #b4637a;
				--syntax-comment: #797593;
				--syntax-keyword: #907aa9;
				--syntax-function: #286983;
				--syntax-variable: #575279;
				--syntax-string: #56949f;
				--syntax-number: #a86a00;
				--syntax-type: #a86a00;
				--syntax-operator: #286983;
				--syntax-punctuation: #f2e9e1;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					/* Rose Pine Moon: pi/themes/rose-pine-moon.json */
					--bg: #232136;
					--fg: #e0def4;
					--muted: #6e6a86;
					--dim: #6e698f;
					--border: #2e2a42;
					--code-bg: #2a273f;
					--accent: #c4a7e7;
					--link: #9ccfd8;
					--info-bg: #2a283e;
					--info-bd: #9a68d6;
					--warn-bg: #2a283e;
					--warn-bd: #f6c177;
					--error-bg: #2a283e;
					--error-bd: #eb6f92;
					--success-bg: #2a283e;
					--success-bd: #9ccfd8;
					--add-bg: #2e2a42;
					--add-fg: #bddfe5;
					--del-bg: #2e2a42;
					--del-fg: #f095af;
					--syntax-comment: #58556b;
					--syntax-keyword: #3e8fb0;
					--syntax-function: #bddfe5;
					--syntax-variable: #9e98dd;
					--syntax-string: #f9d5a2;
					--syntax-number: #ea9a97;
					--syntax-type: #decef2;
					--syntax-operator: #6e698f;
					--syntax-punctuation: #58556b;
				}
			}
			* {
				box-sizing: border-box;
			}
			html {
				-webkit-text-size-adjust: 100%;
			}
			body {
				margin: 0 auto;
				padding: 2.5rem 1.25rem 6rem;
				max-width: 78ch;
				background: var(--bg);
				color: var(--fg);
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					"Segoe UI",
					Helvetica,
					Arial,
					sans-serif;
				font-size: 16px;
				line-height: 1.6;
			}
			h1,
			h2,
			h3,
			h4 {
				line-height: 1.25;
				margin: 2em 0 0.6em;
				font-weight: 600;
			}
			h1 {
				font-size: 2rem;
				margin-top: 0;
			}
			h2 {
				font-size: 1.4rem;
				padding-bottom: 0.2em;
				border-bottom: 1px solid var(--border);
			}
			h3 {
				font-size: 1.15rem;
			}
			h4 {
				font-size: 1rem;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}
			p {
				margin: 0.8em 0;
			}
			a {
				color: var(--link);
				text-underline-offset: 2px;
			}
			hr {
				border: 0;
				border-top: 1px solid var(--border);
				margin: 2em 0;
			}
			small,
			.muted {
				color: var(--muted);
				font-size: 0.9em;
			}
			ul,
			ol {
				padding-left: 1.4em;
			}
			li + li {
				margin-top: 0.25em;
			}

			code {
				font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
				font-size: 0.92em;
				background: var(--code-bg);
				padding: 0.12em 0.35em;
				border-radius: 4px;
			}
			pre {
				position: relative;
				background: var(--code-bg);
				border: 1px solid var(--border);
				border-radius: 6px;
				padding: 0.9em 1em;
				overflow-x: auto;
				white-space: pre-wrap;
				overflow-wrap: anywhere;
				font-size: 0.88em;
				line-height: 1.5;
			}
			pre.no-wrap {
				white-space: pre;
				overflow-wrap: normal;
			}
			pre code {
				background: transparent;
				padding: 0;
				font-size: inherit;
				white-space: inherit;
			}
			pre .copy-btn {
				position: absolute;
				top: 0.5em;
				right: 0.5em;
				background: var(--bg);
				color: var(--muted);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 0.15em 0.5em;
				font-size: 0.75em;
				cursor: pointer;
				opacity: 0;
				transition: opacity 0.15s;
			}
			pre:hover .copy-btn {
				opacity: 1;
			}
			pre .copy-btn:hover {
				color: var(--fg);
			}

			blockquote {
				margin: 1em 0;
				padding: 0.5em 1em;
				border-left: 3px solid var(--border);
				color: var(--muted);
			}

			table {
				border-collapse: collapse;
				width: 100%;
				margin: 1em 0;
				font-size: 0.95em;
			}
			th,
			td {
				padding: 0.55em 0.75em;
				border-bottom: 1px solid var(--border);
				text-align: left;
				vertical-align: top;
			}
			th {
				font-weight: 600;
				background: var(--code-bg);
			}
			tbody tr:hover {
				background: var(--code-bg);
			}

			details {
				margin: 1em 0;
				padding: 0.5em 0.9em;
				border: 1px solid var(--border);
				border-radius: 6px;
			}
			details > summary {
				cursor: pointer;
				font-weight: 500;
			}
			details[open] > summary {
				margin-bottom: 0.5em;
				padding-bottom: 0.5em;
				border-bottom: 1px solid var(--border);
			}

			.callout {
				margin: 1em 0;
				padding: 0.75em 1em;
				border-left: 3px solid var(--info-bd);
				background: var(--info-bg);
				border-radius: 0 6px 6px 0;
			}
			.callout > :first-child {
				margin-top: 0;
			}
			.callout > :last-child {
				margin-bottom: 0;
			}
			.callout.warn {
				border-color: var(--warn-bd);
				background: var(--warn-bg);
			}
			.callout.error {
				border-color: var(--error-bd);
				background: var(--error-bg);
			}
			.callout.success {
				border-color: var(--success-bd);
				background: var(--success-bg);
			}
			.callout-title {
				font-weight: 600;
				margin-bottom: 0.3em;
			}

			pre.diff code .add,
			pre.diff .add {
				display: block;
				background: var(--add-bg);
				color: var(--add-fg);
			}
			pre.diff code .del,
			pre.diff .del {
				display: block;
				background: var(--del-bg);
				color: var(--del-fg);
			}

			.grid-2 {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 1em;
			}
			@media (max-width: 640px) {
				.grid-2 {
					grid-template-columns: 1fr;
				}
			}

			.badge {
				display: inline-block;
				padding: 0.1em 0.55em;
				font-size: 0.78em;
				border: 1px solid var(--border);
				border-radius: 999px;
				color: var(--muted);
				vertical-align: 0.1em;
			}

			/* Diagrams render as SVG; keep them tidy. */
			.mermaid,
			.graphviz {
				margin: 1.2em 0;
				text-align: center;
			}
			.mermaid svg,
			.graphviz svg {
				max-width: 100%;
				height: auto;
				background: transparent;
			}

			/* Tabs — CSS-only via :has(). Supports up to 5 tabs per group. */
			.tabs {
				margin: 1.2em 0;
			}
			.tabs > .tab {
				display: inline-block;
				padding: 0.5em 0.9em 0.6em;
				cursor: pointer;
				color: var(--muted);
				border-bottom: 2px solid transparent;
				user-select: none;
				margin-right: 0.2em;
			}
			.tabs > .tab:first-of-type {
				padding-left: 0;
			}
			.tabs > .tab input {
				display: none;
			}
			.tabs > .tab:hover {
				color: var(--fg);
			}
			.tabs > .tab:has(input:checked) {
				color: var(--fg);
				border-bottom-color: var(--accent);
				font-weight: 500;
			}
			.tabs > .tab-panel {
				display: none;
				padding: 0.9em 0;
				border-top: 1px solid var(--border);
				margin-top: -2px;
			}
			.tabs:has(.tab:nth-of-type(1) input:checked) > .tab-panel:nth-of-type(1),
			.tabs:has(.tab:nth-of-type(2) input:checked) > .tab-panel:nth-of-type(2),
			.tabs:has(.tab:nth-of-type(3) input:checked) > .tab-panel:nth-of-type(3),
			.tabs:has(.tab:nth-of-type(4) input:checked) > .tab-panel:nth-of-type(4),
			.tabs:has(.tab:nth-of-type(5) input:checked) > .tab-panel:nth-of-type(5) {
				display: block;
			}
			.tabs > .tab-panel > :first-child {
				margin-top: 0;
			}
			.tabs > .tab-panel > :last-child {
				margin-bottom: 0;
			}

			/* Syntax highlighting: Rose Pine token colors from the active Pi theme. */
			pre code.hljs {
				background: transparent;
				color: var(--syntax-variable);
				padding: 0;
			}
			.hljs-comment,
			.hljs-quote {
				color: var(--syntax-comment);
			}
			.hljs-keyword,
			.hljs-selector-tag,
			.hljs-subst {
				color: var(--syntax-keyword);
			}
			.hljs-title,
			.hljs-section,
			.hljs-name {
				color: var(--syntax-function);
			}
			.hljs-variable,
			.hljs-template-variable,
			.hljs-attr,
			.hljs-attribute {
				color: var(--syntax-variable);
			}
			.hljs-string,
			.hljs-regexp,
			.hljs-symbol,
			.hljs-bullet {
				color: var(--syntax-string);
			}
			.hljs-number,
			.hljs-literal {
				color: var(--syntax-number);
			}
			.hljs-type,
			.hljs-class .hljs-title,
			.hljs-built_in {
				color: var(--syntax-type);
			}
			.hljs-operator,
			.hljs-deletion,
			.hljs-addition {
				color: var(--syntax-operator);
			}
			.hljs-punctuation {
				color: var(--syntax-punctuation);
			}

			/* Outline — auto-generated, fixed right gutter on wide screens.
     Uses rem (font-size-independent) for the offset calc; `ch` inside .outline
     would resolve against its smaller 0.85em font and undershoot. */
			.outline {
				position: fixed;
				top: 3rem;
				left: calc(50% + 22rem + 1.5rem);
				width: 14rem;
				max-height: calc(100vh - 5rem);
				overflow-y: auto;
				font-size: 0.85em;
				line-height: 1.4;
				padding-left: 1rem;
				border-left: 1px solid var(--border);
			}
			.outline-title {
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.05em;
				font-size: 0.78em;
				margin-bottom: 0.6em;
			}
			.outline ul {
				list-style: none;
				padding: 0;
				margin: 0;
			}
			.outline li {
				margin: 0;
			}
			.outline a {
				color: var(--muted);
				text-decoration: none;
				display: block;
				padding: 0.25em 0 0.25em 0.9em;
				margin-left: -1em;
				border-left: 2px solid transparent;
			}
			.outline a:hover {
				color: var(--fg);
			}
			.outline a.active {
				color: var(--fg);
				border-left-color: var(--accent);
				font-weight: 500;
			}
			.outline ul.sub {
				margin-left: 1em;
			}
			.outline ul.sub a {
				font-size: 0.95em;
			}
			/* Need viewport > 2*(body half + gap + outline + edge): ~22rem + 1.5rem + 14rem + 1rem = 38.5rem per side. */
			@media (max-width: 1280px) {
				.outline {
					display: none;
				}
			}

			html {
				scroll-behavior: smooth;
				scroll-padding-top: 1.5rem;
			}
		</style>
	</head>
	<body>
		<!--
  AGENT: write the response content below this comment, then delete the comment.
  Available primitives are documented in SKILL.md. Key classes:
    callout (info | warn | error | success), callout-title, grid-2,
    diff on pre with add/del spans, no-wrap on pre to preserve horizontal scrolling,
    mermaid/graphviz on pre, tabs/tab/tab-panel, badge, details/summary.
  Note: this comment cannot contain a literal mermaid arrow because the HTML
  parser closes the comment at the first occurrence of those three chars.
-->

		<h1>{{TITLE}}</h1>

		{{BODY}}

		<!-- Auto-outline: scans h2/h3, assigns ids, builds a right-side nav, tracks scroll. -->
		<script>
			(function () {
				const headings = [...document.querySelectorAll("h2, h3")];
				if (headings.length < 3) return;

				const slug = (t) =>
					t
						.toLowerCase()
						.trim()
						.replace(/[^a-z0-9]+/g, "-")
						.replace(/^-|-$/g, "") || "section";
				const seen = new Map();
				headings.forEach((h) => {
					let id = slug(h.textContent);
					const n = seen.get(id) || 0;
					if (n) id = id + "-" + n;
					seen.set(slug(h.textContent), n + 1);
					h.id = id;
				});

				const nav = document.createElement("nav");
				nav.className = "outline";
				nav.innerHTML = '<div class="outline-title">On this page</div>';
				const ul = document.createElement("ul");
				nav.appendChild(ul);
				let subUl = null;
				let lastH2Li = null;
				headings.forEach((h) => {
					const li = document.createElement("li");
					const a = document.createElement("a");
					a.href = "#" + h.id;
					a.textContent = h.textContent;
					a.dataset.target = h.id;
					li.appendChild(a);
					if (h.tagName === "H2") {
						ul.appendChild(li);
						lastH2Li = li;
						subUl = null;
					} else {
						if (!subUl) {
							subUl = document.createElement("ul");
							subUl.className = "sub";
							(lastH2Li || ul).appendChild(subUl);
						}
						subUl.appendChild(li);
					}
				});
				document.body.appendChild(nav);

				const links = new Map();
				nav.querySelectorAll("a").forEach((a) => links.set(a.dataset.target, a));

				function updateActive() {
					const y = window.scrollY + 80;
					let current = null;
					for (const h of headings) {
						if (h.offsetTop <= y) current = h;
						else break;
					}
					nav.querySelectorAll("a.active").forEach((a) => a.classList.remove("active"));
					if (current) {
						const link = links.get(current.id);
						if (link) link.classList.add("active");
					}
				}
				let raf = 0;
				window.addEventListener(
					"scroll",
					() => {
						if (raf) return;
						raf = requestAnimationFrame(() => {
							raf = 0;
							updateActive();
						});
					},
					{ passive: true },
				);
				updateActive();
			})();
		</script>

		<script>
			// Copy-to-clipboard buttons for pre blocks (skips rendered diagrams).
			document.querySelectorAll("pre:not(.mermaid):not(.graphviz)").forEach((pre) => {
				const btn = document.createElement("button");
				btn.className = "copy-btn";
				btn.type = "button";
				btn.textContent = "copy";
				btn.addEventListener("click", async () => {
					try {
						const clone = pre.cloneNode(true);
						clone.querySelector(".copy-btn")?.remove();
						await navigator.clipboard.writeText(clone.textContent);
						btn.textContent = "copied";
						setTimeout(() => {
							btn.textContent = "copy";
						}, 1200);
					} catch {
						btn.textContent = "err";
					}
				});
				pre.appendChild(btn);
			});
		</script>

		<script>
			const richResponseTheme = (() => {
				const palette = {
					dawn: {
						bg: "#fdf9f5",
						fg: "#575279",
						muted: "#9893a5",
						dim: "#797593",
						border: "#dfdad9",
						codeBg: "#fffaf3",
						accent: "#b85c58",
						link: "#286983",
						infoBg: "#f4ede8",
						infoBd: "#56949f",
						warnBd: "#a86a00",
						errorBd: "#b4637a",
						successBd: "#a86a00",
					},
					moon: {
						bg: "#232136",
						fg: "#e0def4",
						muted: "#6e6a86",
						dim: "#6e698f",
						border: "#2e2a42",
						codeBg: "#2a273f",
						accent: "#c4a7e7",
						link: "#9ccfd8",
						infoBg: "#2a283e",
						infoBd: "#9a68d6",
						warnBd: "#f6c177",
						errorBd: "#eb6f92",
						successBd: "#9ccfd8",
					},
				};

				const isDark = () => matchMedia("(prefers-color-scheme: dark)").matches;
				const currentPalette = () => (isDark() ? palette.moon : palette.dawn);
				const oppositePalette = () => (isDark() ? palette.dawn : palette.moon);
				const css = (name) =>
					getComputedStyle(document.documentElement).getPropertyValue(name).trim();
				const current = () => ({
					bg: css("--bg"),
					fg: css("--fg"),
					muted: css("--muted"),
					dim: css("--dim"),
					border: css("--border"),
					codeBg: css("--code-bg"),
					accent: css("--accent"),
					link: css("--link"),
					infoBg: css("--info-bg"),
					infoBd: css("--info-bd"),
					warnBd: css("--warn-bd"),
					errorBd: css("--error-bd"),
					successBd: css("--success-bd"),
				});

				const normalizeColor = (value) => {
					if (!value) return value;
					const normalized = value.trim().toLowerCase();
					if (/^#[0-9a-f]{3}$/i.test(normalized)) {
						return "#" + [...normalized.slice(1)].map((ch) => ch + ch).join("");
					}
					const rgb = normalized.match(/^rgba?\(([^)]+)\)$/);
					if (rgb) {
						const [r, g, b] = rgb[1]
							.split(",")
							.slice(0, 3)
							.map((part) => Number.parseInt(part.trim(), 10));
						if ([r, g, b].every((part) => Number.isFinite(part))) {
							return "#" + [r, g, b].map((part) => part.toString(16).padStart(2, "0")).join("");
						}
					}
					return normalized;
				};

				const themedGraphvizColor = (value) => {
					const normalized = normalizeColor(value);
					if (!normalized || normalized === "none" || normalized === "transparent") return value;
					if (normalized === "black" || normalized === "#000000") return current().fg;
					if (normalized === "white" || normalized === "#ffffff") return current().bg;

					const from = oppositePalette();
					const to = currentPalette();
					for (const [key, source] of Object.entries(from)) {
						if (normalized === source) return to[key];
					}
					return value;
				};

				const rewriteStyleColors = (styleValue) =>
					styleValue
						.split(";")
						.map((entry) => {
							const [prop, raw] = entry.split(":");
							if (!prop || raw == null) return entry;
							if (!["fill", "stroke", "color", "stop-color"].includes(prop.trim().toLowerCase())) {
								return entry;
							}
							return `${prop}:${themedGraphvizColor(raw)}`;
						})
						.join(";");

				const themeGraphvizSvg = (svg) => {
					svg.style.background = "transparent";
					svg.querySelectorAll("*").forEach((node) => {
						["fill", "stroke", "color", "stop-color"].forEach((attr) => {
							if (node.hasAttribute(attr)) {
								node.setAttribute(attr, themedGraphvizColor(node.getAttribute(attr)));
							}
						});
						if (node.hasAttribute("style")) {
							node.setAttribute("style", rewriteStyleColors(node.getAttribute("style")));
						}
					});
					return svg;
				};

				const mermaidTheme = () => {
					const colors = current();
					return {
						theme: "base",
						darkMode: isDark(),
						themeVariables: {
							background: colors.bg,
							fontFamily:
								'ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif',
							fontSize: "16px",
							textColor: colors.fg,
							primaryColor: colors.codeBg,
							primaryTextColor: colors.fg,
							primaryBorderColor: colors.border,
							secondaryColor: colors.infoBg,
							secondaryTextColor: colors.fg,
							secondaryBorderColor: colors.infoBd,
							tertiaryColor: colors.bg,
							tertiaryTextColor: colors.fg,
							tertiaryBorderColor: colors.border,
							lineColor: colors.link,

							labelColor: colors.fg,

							actorBkg: colors.codeBg,
							actorBorder: colors.border,
							actorTextColor: colors.fg,
							actorLineColor: colors.link,
							signalColor: colors.link,
							signalTextColor: colors.fg,
							noteBkgColor: colors.infoBg,
							noteBorderColor: colors.infoBd,
							noteTextColor: colors.fg,
							activationBkgColor: colors.codeBg,

						},
					};
				};

				return { mermaidTheme, themeGraphvizSvg };
			})();
		</script>

		<!--
  Mermaid: loaded only if a .mermaid block exists. UMD build (not ESM) so it works
  from file:// origins — `file://` is a unique security origin and blocks ES-module
  dynamic imports. The `@11` tag on jsdelivr auto-resolves to the latest 11.x release.
-->
		<script>
			if (document.querySelector(".mermaid")) {
				const s = document.createElement("script");
				s.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
				s.onload = async () => {
					try {
						window.mermaid.initialize({
							startOnLoad: false,
							securityLevel: "loose",
							...richResponseTheme.mermaidTheme(),
						});
						await window.mermaid.run({ querySelector: ".mermaid" });
					} catch (e) {
						console.error("[mermaid] render failed:", e?.message || e, e);
						document.querySelectorAll(".mermaid").forEach((el) => {
							if (!el.dataset.mermaidError) {
								el.dataset.mermaidError = "1";
								el.insertAdjacentHTML(
									"beforebegin",
									'<div class="callout error"><div class="callout-title">Mermaid render error</div>' +
										"<code>" +
										String(e?.message || e).replace(
											/[<>&]/g,
											(c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[c],
										) +
										"</code></div>",
								);
							}
						});
					}
				};
				s.onerror = () => console.error("[mermaid] failed to load script from CDN");
				document.head.appendChild(s);
			}
		</script>

		<!--
  Graphviz: loaded only if a .graphviz block exists. @viz-js/viz bundles Graphviz
  to WebAssembly, so rendering works in-browser without requiring `dot` in PATH.
-->
		<script>
			if (document.querySelector(".graphviz")) {
				const s = document.createElement("script");
				s.src = "https://cdn.jsdelivr.net/npm/@viz-js/viz@3/lib/viz-standalone.js";
				s.onload = async () => {
					try {
						const viz = await window.Viz.instance();
						document.querySelectorAll(".graphviz").forEach((el) => {
							const svg = richResponseTheme.themeGraphvizSvg(viz.renderSVGElement(el.textContent));
							el.replaceChildren(svg);
						});
					} catch (e) {
						console.error("[graphviz] render failed:", e?.message || e, e);
						document.querySelectorAll(".graphviz").forEach((el) => {
							if (!el.dataset.graphvizError) {
								el.dataset.graphvizError = "1";
								el.insertAdjacentHTML(
									"beforebegin",
									'<div class="callout error"><div class="callout-title">Graphviz render error</div>' +
										"<code>" +
										String(e?.message || e).replace(
											/[<>&]/g,
											(c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[c],
										) +
										"</code></div>",
								);
							}
						});
					}
				};
				s.onerror = () => console.error("[graphviz] failed to load script from CDN");
				document.head.appendChild(s);
			}
		</script>

		<!--
  Syntax highlighting (highlight.js): opt-in via code blocks with a language-xxx class.
  Loads only when at least one such block exists. Token colors come from the inline
  Rose Pine Dawn/Moon CSS variables above, matching the active OS color scheme.
-->
		<script>
			(function () {
				const blocks = document.querySelectorAll('pre code[class*="language-"]');
				if (!blocks.length) return;
				const base = "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build";
				const s = document.createElement("script");
				s.src = base + "/highlight.min.js";
				s.onload = () => blocks.forEach((el) => window.hljs.highlightElement(el));
				s.onerror = () => console.error("[hljs] failed to load script from CDN");
				document.head.appendChild(s);
			})();
		</script>
	</body>
</html>
